server {
    listen 80;
    server_name docs.bhoomione.in;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name docs.bhoomione.in;

    # SSL Certificates (managed by Certbot on the host)
    ssl_certificate /etc/letsencrypt/live/docs.bhoomione.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/docs.bhoomione.in/privkey.pem;
    
    # Secure parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://127.0.0.1:8096;
        proxy_http_version 1.1;
        
        # WebSockets support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

