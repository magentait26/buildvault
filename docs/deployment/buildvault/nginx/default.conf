# -------------------------------------------------------------------------
# BuildVault Master Reverse Proxy Config with SSL Configurations Placeholders
# -------------------------------------------------------------------------

# Redirect all HTTP requests to modern secure HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name docs.bhoomione.in;

    # Certbot / Let's Encrypt validation port mapping
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Principal Secure Application Server Proxy
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docs.bhoomione.in;

    # 🔒 SSL Credentials Template (Uncomment paths after issuing Certbot certificates)
    # ssl_certificate /etc/letsencrypt/live/docs.bhoomione.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/docs.bhoomione.in/privkey.pem;
    
    # Best-practice High Security SSL Parameters (A+ classification)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA256:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA256';
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Secure Header Injections
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";
    add_header Content-Security-Policy "upgrade-insecure-requests; default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; img-src 'self' data: https: referrer;";

    # Web root pointer mapped dynamically to static HTML paths 
    root /var/www/public;
    index index.php;

    # Logs targets
    access_log /var/log/nginx/buildvault_access.log;
    error_log /var/log/nginx/buildvault_error.log;

    # Dynamic API Request routing (Forward to PHP-FPM API Container)
    location /api {
        alias /var/www/public;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Direct PHP file executions (Sanctum endpoints and resource generation routes)
    location ~ \.php$ {
        fastcgi_pass buildvault-api:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/public$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Serve static assets and files loaded on Laravel's Local Filesystem disk
    location /storage {
        proxy_pass http://buildvault-nginx:8080/storage;
        proxy_set_header Host $host;
    }

    # Default UI interactions routed to static React web server container
    location / {
        proxy_pass http://buildvault-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Deny raw dotfile access (prevent leakage of configurations and Git logs)
    location ~ /\. {
        deny all;
    }
}
