# -------------------------------------------------------------------------
# BuildVault Main Nginx Configuration for docker-compose environment
# -------------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name docs.bhoomione.in;

    # Secure Header Injections
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Logs targets
    access_log /var/log/nginx/buildvault_access.log;
    error_log /var/log/nginx/buildvault_error.log;

    # Dynamic API Request routing (Forward directly to PHP-FPM API Container)
    location /api {
        fastcgi_pass buildvault-api:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        include fastcgi_params;
        
        # Buffer optimizations
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # Serve static files from Laravel's storage
    location /storage {
        alias /var/www/storage/app/public;
        try_files $uri $uri/ =404;
    }

    # Default UI interactions routed to static React web server container
    location / {
        proxy_pass http://buildvault-web:80;
        
        # WebSockets support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
